# 本文件定义当前服务对外暴露的 OpenAPI 契约，联调与文档生成都以此为准。
openapi: 3.0.3
info:
  title: gotribe User API
  version: 0.1.0
  description: |
    User-facing API contract for gotribe.
    This service is cloud-native oriented and only covers client-side APIs.
    Admin, RBAC, menu, audit, CMS, and back-office APIs are intentionally excluded.

servers:
  - url: http://localhost:8080
    description: Local development

tags:
  - name: Health
  - name: Auth
  - name: Profile
  - name: Examples
  - name: Posts
  - name: UserEvents

paths:
  /livez:
    get:
      tags: [Health]
      summary: Liveness probe
      security: []
      responses:
        '200':
          description: Process is alive
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LivenessResponse'

  /readyz:
    get:
      tags: [Health]
      summary: Readiness probe
      security: []
      responses:
        '200':
          description: Dependencies are ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessResponse'
        '503':
          description: Dependencies are not ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessResponse'

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Login with username, email, or phone
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login succeeded
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/XRateLimitLimit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/XRateLimitRemaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/XRateLimitReset'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Refresh succeeded
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/XRateLimitLimit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/XRateLimitRemaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/XRateLimitReset'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Logout and revoke refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '204':
          description: Logout succeeded
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/me:
    get:
      tags: [Profile]
      summary: Get current user profile
      responses:
        '200':
          description: Current profile
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/XRateLimitLimit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/XRateLimitRemaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/XRateLimitReset'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
    patch:
      tags: [Profile]
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: Updated profile
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/XRateLimitLimit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/XRateLimitRemaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/XRateLimitReset'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/me/password:
    post:
      tags: [Profile]
      summary: Change current user password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '204':
          description: Password changed
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/examples:
    get:
      tags: [Examples]
      summary: List current user's examples
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
        - name: keyword
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Example list
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/XRateLimitLimit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/XRateLimitRemaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/XRateLimitReset'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExampleListEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Examples]
      summary: Create an example
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExampleCreateRequest'
      responses:
        '201':
          description: Example created
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/XRateLimitLimit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/XRateLimitRemaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/XRateLimitReset'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExampleEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/examples/{exampleID}:
    get:
      tags: [Examples]
      summary: Get example detail
      parameters:
        - name: exampleID
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Example detail
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/XRateLimitLimit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/XRateLimitRemaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/XRateLimitReset'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExampleEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Examples]
      summary: Update example
      parameters:
        - name: exampleID
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExampleUpdateRequest'
      responses:
        '200':
          description: Example updated
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/XRateLimitLimit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/XRateLimitRemaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/XRateLimitReset'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExampleEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Examples]
      summary: Delete example
      parameters:
        - name: exampleID
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Example deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/posts:
    get:
      tags: [Posts]
      summary: List posts
      security: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
        - name: keyword
          in: query
          schema:
            type: string
        - name: tag
          in: query
          schema:
            type: string
        - name: dynamic_type
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: integer
        - name: type
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Post list
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/XRateLimitLimit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/XRateLimitRemaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/XRateLimitReset'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostListEnvelope'

  /api/v1/posts/{postID}:
    get:
      tags: [Posts]
      summary: Get post detail by business post_id
      security: []
      parameters:
        - name: postID
          in: path
          required: true
          schema:
            type: string
        - name: password
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Post detail
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/XRateLimitLimit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/XRateLimitRemaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/XRateLimitReset'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostEnvelope'
        '404':
          $ref: '#/components/responses/NotFound'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/user-events:
    post:
      tags: [UserEvents]
      summary: Submit user event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserEventCreateRequest'
      responses:
        '204':
          description: Event submitted
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  headers:
    XRateLimitLimit:
      schema:
        type: integer
    XRateLimitRemaining:
      schema:
        type: integer
    XRateLimitReset:
      schema:
        type: integer
        format: int64

  parameters:
    Page:
      name: page
      in: query
      schema:
        type: integer
        default: 1
        minimum: 1
    PerPage:
      name: per_page
      in: query
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    TooManyRequests:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'

  schemas:
    LivenessResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            status:
              type: string
            service:
              type: string
            version:
              type: string
            timestamp:
              type: string
              format: date-time
        request_id:
          type: string

    ReadinessResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            status:
              type: string
            service:
              type: string
            version:
              type: string
            timestamp:
              type: string
              format: date-time
            dependencies:
              type: object
              additionalProperties:
                type: object
                properties:
                  status:
                    type: string
                  message:
                    type: string
        request_id:
          type: string

    ErrorEnvelope:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        request_id:
          type: string

    LoginRequest:
      type: object
      required: [identity, password]
      properties:
        identity:
          type: string
        password:
          type: string
          format: password

    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string

    LogoutRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string

    AuthPayload:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        token_type:
          type: string
        expires_in:
          type: integer
        user:
          $ref: '#/components/schemas/Profile'

    AuthEnvelope:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/AuthPayload'
        request_id:
          type: string

    Profile:
      type: object
      properties:
        id:
          type: integer
          format: int64
        username:
          type: string
        project_id:
          type: string
        nickname:
          type: string
        email:
          type: string
        phone:
          type: string
        sex:
          type: string
        status:
          type: integer
        birthday:
          type: string
        background:
          type: string
        ext:
          type: string
        avatar_url:
          type: string
        created_at:
          type: string
        updated_at:
          type: string

    ProfileEnvelope:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/Profile'
        request_id:
          type: string

    UpdateProfileRequest:
      type: object
      properties:
        nickname:
          type: string
        email:
          type: string
        phone:
          type: string
        sex:
          type: string
        birthday:
          type: string
          example: "1990-01-02"
        background:
          type: string
        ext:
          type: string
        avatar_url:
          type: string

    ChangePasswordRequest:
      type: object
      required: [current_password, new_password]
      properties:
        current_password:
          type: string
          format: password
        new_password:
          type: string
          format: password

    ExampleOwner:
      type: object
      properties:
        user_id:
          type: integer
          format: int64
        username:
          type: string
        nickname:
          type: string

    ExamplePostRef:
      type: object
      properties:
        post_id:
          type: string
        title:
          type: string
        type:
          type: integer
        status:
          type: integer

    Example:
      type: object
      properties:
        example_id:
          type: string
        name:
          type: string
        description:
          type: string
        status:
          type: integer
        owner:
          $ref: '#/components/schemas/ExampleOwner'
        primary_post:
          $ref: '#/components/schemas/ExamplePostRef'
        posts:
          type: array
          items:
            $ref: '#/components/schemas/ExamplePostRef'
        created_at:
          type: string
        updated_at:
          type: string

    ExampleEnvelope:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/Example'
        request_id:
          type: string

    ExampleListEnvelope:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Example'
        meta:
          type: object
          properties:
            page:
              type: integer
            per_page:
              type: integer
            total:
              type: integer
              format: int64
        request_id:
          type: string

    ExampleCreateRequest:
      type: object
      required: [name, primary_post_id, post_ids]
      properties:
        name:
          type: string
        description:
          type: string
        status:
          type: integer
        primary_post_id:
          type: string
        post_ids:
          type: array
          items:
            type: string

    ExampleUpdateRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        status:
          type: integer
        primary_post_id:
          type: string
        post_ids:
          type: array
          items:
            type: string

    Tag:
      type: object
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        slug:
          type: string
        color:
          type: string

    Post:
      type: object
      properties:
        id:
          type: integer
          format: int64
        post_id:
          type: string
        category_id:
          type: integer
          format: int64
        project_id:
          type: string
        user_id:
          type: integer
          format: int64
        author:
          type: string
        title:
          type: string
        content:
          type: string
        html_content:
          type: string
        description:
          type: string
        icon:
          type: string
        view:
          type: integer
          format: int64
        type:
          type: integer
        status:
          type: integer
        unit_price:
          type: integer
        location:
          type: string
        people:
          type: string
        time:
          type: string
        show_time:
          type: string
        dynamic_type:
          type: string
        sort:
          type: integer
          format: int64
        event_start_at:
          type: string
        event_end_at:
          type: string
        register_url:
          type: string
        tags:
          type: array
          items:
            $ref: '#/components/schemas/Tag'
        created_at:
          type: string
        updated_at:
          type: string

    PostEnvelope:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/Post'
        request_id:
          type: string

    PostListEnvelope:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Post'
        meta:
          type: object
          properties:
            page:
              type: integer
            per_page:
              type: integer
            total:
              type: integer
              format: int64
        request_id:
          type: string

    UserEventCreateRequest:
      type: object
      required: [event_type]
      properties:
        event_type:
          type: integer
        event_detail:
          type: string
        duration:
          type: integer
        referer:
          type: string
        platform:
          type: string

security:
  - bearerAuth: []
