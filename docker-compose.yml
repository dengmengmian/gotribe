# 本地开发一键启动：PostgreSQL + Redis + ToC API + Admin
# 用法:
#   cp .env.example .env
#   # 编辑 .env，设置 JWT 密钥
#   docker-compose up -d
#
# 访问地址：
#   - ToC API:    http://localhost:8080
#   - Admin Web:  http://localhost:8088/admin
#   - Admin API:  http://localhost:8088/api
#   - Swagger:    http://localhost:8088/swagger/index.html

services:
  postgres:
    image: postgres:16-alpine
    container_name: gotribe-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gotribe}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gotribe_dev}
      POSTGRES_DB: ${POSTGRES_DB:-gotribe}
      PGUSER: ${POSTGRES_USER:-gotribe}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - gotribe

  redis:
    image: redis:7-alpine
    container_name: gotribe-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - gotribe

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gotribe-api
    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      GOTRIBE_APP_NAME: gotribe-api
      GOTRIBE_APP_ENV: development
      GOTRIBE_APP_DEFAULT_PROJECT_ID: ${GOTRIBE_APP_DEFAULT_PROJECT_ID:-1}
      GOTRIBE_SERVER_PORT: 8080
      GOTRIBE_DATABASE_TYPE: postgres
      GOTRIBE_DATABASE_HOST: postgres
      GOTRIBE_DATABASE_PORT: 5432
      GOTRIBE_DATABASE_USERNAME: ${POSTGRES_USER:-gotribe}
      GOTRIBE_DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-gotribe_dev}
      GOTRIBE_DATABASE_DATABASE: ${POSTGRES_DB:-gotribe}
      GOTRIBE_DATABASE_SSLMODE: disable
      GOTRIBE_DATABASE_LOG_MODE: "true"
      GOTRIBE_REDIS_ADDR: redis:6379
      GOTRIBE_REDIS_PASSWORD: ""
      GOTRIBE_REDIS_DB: 0
      GOTRIBE_AUTH_SECRET: ${GOTRIBE_AUTH_SECRET}
      GOTRIBE_AUTH_ISSUER: gotribe
      GOTRIBE_AUTH_ACCESS_TOKEN_TTL_MINUTES: 120
      GOTRIBE_AUTH_REFRESH_TOKEN_TTL_HOURS: 168
      GOTRIBE_RATE_LIMIT_ENABLED: "true"
      GOTRIBE_OBSERVABILITY_METRICS_ENABLED: "true"
      GOTRIBE_OBSERVABILITY_TRACING_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gotribe

  admin:
    build:
      context: .
      dockerfile: Dockerfile.admin
    container_name: gotribe-admin
    ports:
      - "${ADMIN_PORT:-8088}:8088"
    environment:
      GOTRIBE_ADMIN_CONFIG: /app/configs/admin.yaml
      GOTRIBE_ADMIN_RBAC_MODEL: /app/configs/rbac_model.conf
      GOTRIBE_ADMIN_WEB_DIST: /app/web/admin/dist
      GOTRIBE_ADMIN_MODE: debug
      GOTRIBE_ADMIN_PORT: 8088
      GOTRIBE_ADMIN_INIT_DATA: "true"
      GOTRIBE_ADMIN_SYNC_SEED_DATA: ${GOTRIBE_ADMIN_SYNC_SEED_DATA:-false}
      GOTRIBE_ADMIN_ENABLE_MIGRATE: "true"
      GOTRIBE_DATABASE_HOST: postgres
      GOTRIBE_DATABASE_PORT: 5432
      GOTRIBE_DATABASE_USERNAME: ${POSTGRES_USER:-gotribe}
      GOTRIBE_DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-gotribe_dev}
      GOTRIBE_DATABASE_DATABASE: ${POSTGRES_DB:-gotribe}
      GOTRIBE_DATABASE_SSLMODE: disable
      GOTRIBE_DATABASE_LOG_MODE: "true"
      GOTRIBE_ADMIN_JWT_KEY: ${JWT_KEY}
      GOTRIBE_ADMIN_JWT_TIMEOUT: 12
      GOTRIBE_ADMIN_JWT_MAX_REFRESH: 12
      GOTRIBE_ADMIN_LOGS_PATH: /app/logs
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gotribe

volumes:
  postgres_data:
  redis_data:

networks:
  gotribe:
    driver: bridge
