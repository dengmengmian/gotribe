# 本文件定义应用在 Kubernetes 中的自动扩缩容策略。
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gotribe-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gotribe-api
  minReplicas: 2
  maxReplicas: 5
  metrics:
    # 当前按 CPU 使用率进行自动扩缩容。
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
