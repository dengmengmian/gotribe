# 本文件定义 Kubernetes 中的非敏感配置项。
apiVersion: v1
kind: ConfigMap
metadata:
  name: gotribe-api-config
data:
  # 应用运行环境。
  GOTRIBE_APP_ENV: "production"
  # 默认项目 ID。
  GOTRIBE_APP_DEFAULT_PROJECT_ID: "replace-with-project-id"
  # HTTP 服务端口。
  GOTRIBE_SERVER_PORT: "8080"
  # 数据库连接信息。
  GOTRIBE_DATABASE_TYPE: "postgres"
  GOTRIBE_DATABASE_HOST: "postgres"
  GOTRIBE_DATABASE_PORT: "5432"
  GOTRIBE_DATABASE_USERNAME: "replace-me"
  GOTRIBE_DATABASE_DATABASE: "replace-me"
  GOTRIBE_DATABASE_QUERY: "connect_timeout=10 TimeZone=Asia/Shanghai"
  GOTRIBE_DATABASE_SSLMODE: "disable"
  # Redis 连接地址。
  GOTRIBE_REDIS_ADDR: "redis:6379"
