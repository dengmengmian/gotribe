# golangci-lint 配置
# 安装: brew install golangci-lint
# 运行: golangci-lint run

run:
  timeout: 5m
  issues-exit-code: 1
  tests: true

output:
  format: colored-line-number
  print-issued-lines: true
  print-linter-name: true

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true
  govet:
    enable-all: true
    disable:
      - fieldalignment
  gocyclo:
    min-complexity: 15
  misspell:
    locale: US
  revive:
    rules:
      - name: exported
        arguments: ["checkPrivateReceivers", "sayRepetitiveInsteadOfStutters"]
      - name: var-naming
        arguments: [["ID", "URL", "HTTP", "JWT", "DB", "API"], []]
  staticcheck:
    checks: ["all"]

linters:
  enable:
    - bodyclose
    - dogsled
    - dupl
    - errcheck
    - gochecknoinits
    - goconst
    - gocritic
    - gocyclo
    - gofmt
    - goimports
    - gosimple
    - govet
    - ineffassign
    - misspell
    - nakedret
    - prealloc
    - revive
    - staticcheck
    - stylecheck
    - typecheck
    - unconvert
    - unparam
    - unused
    - whitespace
  disable:
    - depguard      # 项目没有特定依赖限制
    - lll           # 行长度限制由 editorconfig 控制
    - maligned      # 已弃用，被 fieldalignment 替代
    - godox         # 允许 TODO/FIXME 注释
    - gochecknoglobals  # 项目有合理的全局变量（如 viper 配置）

issues:
  exclude-rules:
    # 测试文件允许部分规则放宽
    - path: _test\.go
      linters:
        - gocyclo
        - dupl
        - gosec
    # 忽略 vendor 目录
    - path: vendor/
      linters:
        - all
    # 忽略自动生成的文件
    - path: \.pb\.go
      linters:
        - all
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
